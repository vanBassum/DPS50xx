name: Release (ESP-IDF)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  IDF_VERSION: "v6.0"
  PROJECT_NAME: "DPS50xx"

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        run: cd frontend && pnpm install --frozen-lockfile && pnpm build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  build-firmware:
    needs: build-frontend
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target: [esp32c3, esp32]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build firmware (ESP-IDF)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.IDF_VERSION }}
          target: ${{ matrix.target }}
          command: |
            set -euo pipefail
            idf.py set-target ${{ matrix.target }}
            idf.py build
            cd build && esptool.py --chip ${{ matrix.target }} merge_bin -o merged-factory.bin -f raw @flash_args

      - name: Prepare release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist

          # Full factory image (bootloader + partition table + all partitions)
          cp build/merged-factory.bin dist/${{ env.PROJECT_NAME }}-${{ matrix.target }}-factory.bin

          # Application-only binary (for OTA update via /api/upload/app)
          cp build/${{ env.PROJECT_NAME }}.bin dist/${{ env.PROJECT_NAME }}-${{ matrix.target }}-app.bin

          # WWW FAT partition image (for update via /api/upload/www)
          cp build/www.bin dist/${{ env.PROJECT_NAME }}-${{ matrix.target }}-www.bin

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target }}
          path: dist/

  release:
    needs: build-firmware
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: firmware-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ### Firmware files

            **ESP32-C3:**
            - **${{ env.PROJECT_NAME }}-esp32c3-factory.bin** — Full factory image. Use for initial flashing via `esptool.py`.
            - **${{ env.PROJECT_NAME }}-esp32c3-app.bin** — Application firmware only. Upload via the web UI for OTA update.
            - **${{ env.PROJECT_NAME }}-esp32c3-www.bin** — Web interface FAT image. Upload via the web UI to update the frontend.

            **ESP32:**
            - **${{ env.PROJECT_NAME }}-esp32-factory.bin** — Full factory image. Use for initial flashing via `esptool.py`.
            - **${{ env.PROJECT_NAME }}-esp32-app.bin** — Application firmware only. Upload via the web UI for OTA update.
            - **${{ env.PROJECT_NAME }}-esp32-www.bin** — Web interface FAT image. Upload via the web UI to update the frontend.
          files: |
            dist/${{ env.PROJECT_NAME }}-*
